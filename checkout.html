<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Tasty Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">🍜 Tasty Hub</a>
  <div class="nav-right">
    <button class="cart-btn" onclick="window.location.href='index.html'">← Back to Menu</button>
  </div>
</nav>

<div class="checkout-page">
  <div class="page-header">
    <h1>🛍️ Checkout</h1>
    <p>Fill in your details to place your order</p>
  </div>

  <!-- ORDER SUMMARY -->
  <div class="form-card">
    <h3>📋 Order Summary</h3>
    <div class="order-summary-items" id="checkoutItems">
      <p style="color:var(--text-muted);font-size:0.9rem">No items in cart.</p>
    </div>
    <div id="checkoutTotals"></div>
  </div>

  <!-- CUSTOMER DETAILS -->
  <form class="form-card" id="checkoutForm" onsubmit="submitCheckout(event)">
    <h3>👤 Your Details</h3>
    <div class="form-row">
      <div class="form-group">
        <label for="custName">Full Name *</label>
        <input type="text" id="custName" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="custPhone">Mobile Number *</label>
        <input type="tel" id="custPhone" placeholder="+91 XXXXX XXXXX" required pattern="[6-9][0-9]{9}" />
      </div>
    </div>
    <div class="form-group">
      <label for="custAddress">Delivery Address *</label>
      <input type="text" id="custAddress" placeholder="House / Flat No., Street, Area" required />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="custLandmark">Landmark</label>
        <input type="text" id="custLandmark" placeholder="Near school, temple, etc." />
      </div>
      <div class="form-group">
        <label for="custNotes">Notes for Order</label>
        <input type="text" id="custNotes" placeholder="Extra spicy, no onion..." />
      </div>
    </div>

    <!-- DELIVERY LOCATION -->
    <h3 style="margin-top:8px">🚚 Delivery Location</h3>
    <div class="delivery-options">
      <label class="delivery-opt">
        <input type="radio" name="deliveryLoc" value="Main Village Stop" required />
        <label>📍 Main Village Stop</label>
        <span class="free-tag">FREE</span>
      </label>
      <label class="delivery-opt">
        <input type="radio" name="deliveryLoc" value="College Stop" />
        <label>🎓 College Stop</label>
        <span class="free-tag">FREE</span>
      </label>
      <label class="delivery-opt">
        <input type="radio" name="deliveryLoc" value="Mohopada" />
        <label>🏘️ Mohopada</label>
        <span class="free-tag">FREE</span>
      </label>
      <label class="delivery-opt">
        <input type="radio" name="deliveryLoc" value="Pillai College" />
        <label>🏫 Pillai College</label>
        <span class="free-tag">FREE</span>
      </label>
      <label class="delivery-opt">
        <input type="radio" name="deliveryLoc" value="Nearby Area" />
        <label>🌍 Nearby Area</label>
        <span class="free-tag">FREE</span>
      </label>
    </div>
    <div class="delivery-notice">
      🚚 No Delivery Charges for these locations!
    </div>

    <button type="submit" class="submit-btn">Continue to Payment →</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
<script>
  // Load order summary on checkout page
  document.addEventListener('DOMContentLoaded', () => {
    const cart = getCart();
    const itemsEl = document.getElementById('checkoutItems');
    const totalsEl = document.getElementById('checkoutTotals');
    if (!cart.length) {
      itemsEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem">Your cart is empty. <a href="index.html" style="color:var(--orange)">Go back to menu →</a></p>';
      return;
    }
    let subtotal = 0;
    itemsEl.innerHTML = cart.map(i => {
      const total = i.price * i.qty;
      subtotal += total;
      return `<div class="summary-item">
        <span class="item-name">${i.name} × ${i.qty}</span>
        <span class="item-total">₹${total}</span>
      </div>`;
    }).join('');
    const gst = Math.round(subtotal * 0.05);
    const grand = subtotal + gst;
    totalsEl.innerHTML = `
      <div class="summary-total-row"><span>Subtotal</span><span>₹${subtotal}</span></div>
      <div class="summary-total-row"><span>GST (5%)</span><span>₹${gst}</span></div>
      <div class="summary-total-row"><span>Delivery</span><span style="color:var(--success)">FREE</span></div>
      <div class="summary-total-row grand"><span>Grand Total</span><span style="color:var(--orange)">₹${grand}</span></div>
    `;
  });

  function submitCheckout(e) {
    e.preventDefault();
    const cart = getCart();
    if (!cart.length) { showToast('Your cart is empty!', 'error'); return; }
    const loc = document.querySelector('input[name="deliveryLoc"]:checked');
    if (!loc) { showToast('Please select a delivery location.', 'error'); return; }
    const order = {
      name: document.getElementById('custName').value.trim(),
      phone: document.getElementById('custPhone').value.trim(),
      address: document.getElementById('custAddress').value.trim(),
      landmark: document.getElementById('custLandmark').value.trim(),
      notes: document.getElementById('custNotes').value.trim(),
      location: loc.value,
    };
    localStorage.setItem('th_order', JSON.stringify(order));
    window.location.href = 'payment.html';
  }
</script>
</body>
</html>
